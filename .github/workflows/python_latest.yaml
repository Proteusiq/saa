name: python_latest
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Force uv to ignore system Pythons preinstalled on the runner.
      # Without this, `3` resolves to the runner's bundled 3.12 instead
      # of uv's latest managed CPython.
      UV_PYTHON_PREFERENCE: only-managed
    strategy:
      fail-fast: false
      matrix:
        python-request: ["3", "3t"]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Drop .python-version so uv uses the requested version
        run: rm -f .python-version
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-request }}
      - name: Record resolved Python
        run: |
          resolved=$(uv run python -c "import sys; print(sys.version)")
          echo "Resolved Python for request '${{ matrix.python-request }}':"
          echo "$resolved"
          {
            echo "### Python ${{ matrix.python-request }}"
            echo ""
            echo '```'
            echo "$resolved"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - run: uv sync
      - run: uv run ruff format --check
      - run: uv run ruff check
      - run: uv run ty check
      - run: uv run pytest
