on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

name: release

jobs:
  pypi:
    name: upload release to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: build
        run: uv build

      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
